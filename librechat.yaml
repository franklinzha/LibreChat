version: 1.3.6
# updated: 2026-04-02
cache: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "openrouter/free"
          - "stepfun/step-3.5-flash:free"
          - "arcee-ai/arcee-trinity-large-preview:free"
          - "liquid/lfm2-5-1-2b-thinking:free"
          - "liquid/lfm2-5-1-2b-instruct:free"
          - "nvidia/nemotron-3-nano-30b-a3b:free"
          - "nvidia/nemotron-3-super-120b-a12b:free"
          - "nvidia/nemotron-nano-12b-v2-vl:free"
          - "arcee-ai/arcee-trinity-mini:free"
          - "qwen/qwen3-next-80b-a3b-instruct:free"
          - "qwen/qwen3.6-plus-preview:free"
          - "qwen/qwen3-coder:free"
          - "openai/gpt-oss-120b:free"
          - "openai/gpt-oss-20b:free"
          - "minimax/minimax-m2.5:free"
          - "z-ai/glm-4.5-air:free"
          - "venice-ai/venice-uncensored:free"
          - "google/gemma-3n-2b-it:free"
          - "google/gemma-3n-e4b-it:free"
          - "google/gemma-3-4b-it:free"
          - "google/gemma-3-12b-it:free"
          - "google/gemma-3-27b-it:free"
          - "meta-llama/llama-3.3-70b-instruct:free"
          - "meta-llama/llama-3.2-3b-instruct:free"
          - "nousresearch/hermes-3-llama-3.1-405b:free"
        fetch: true
      titleConvo: true
      titleModel: "qwen/qwen3.6-plus-preview:free"
      dropParams:
        - "stop"
      headers:
        "HTTP-Referer": "https://librechat-klml.onrender.com"
        "X-Title": "LibreChat"

    - name: "OpenRouter 图片生成"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "black-forest-labs/flux.2-klein-4b"
          - "black-forest-labs/flux.2-max"
          - "black-forest-labs/flux.2-pro"
          - "black-forest-labs/flux.2-flex"
          - "bytedance-seed/seedream-4-5"
          - "sourceful/riverflow-v2-fast-preview"
          - "sourceful/riverflow-v2-pro"
          - "sourceful/riverflow-v2-max-preview"
          - "sourceful/riverflow-v2-fast"
        fetch: false
      titleConvo: false
      dropParams:
        - "stop"
        - "temperature"
        - "frequency_penalty"
        - "presence_penalty"
      headers:
        "HTTP-Referer": "https://librechat-klml.onrender.com"
        "X-Title": "LibreChat"
